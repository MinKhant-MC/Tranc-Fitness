<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://api.qrserver.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Tranc Gym Registration</title>
  <meta name="theme-color" content="#15130f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/tranc-gym-logo.png">
  <link rel="apple-touch-icon" href="assets/tranc-gym-logo.png">
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="assets/tranc-gym-logo.png" as="image">
  <link rel="prefetch" href="index.html">
  <link rel="prefetch" href="register.html">
  <link rel="prefetch" href="member.html">
  <link rel="prefetch" href="admin.html">  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page gym-bg" data-page="register">
  <main class="page-shell">
    <section class="page-hero glass-panel">
      <div>
        <div class="brand-mark">
          <img class="brand-logo-image" src="assets/tranc-gym-logo.png" alt="Tranc Gym logo">
        </div>
        <h1 data-i18n="register.title">Member Registration</h1>
        <p data-i18n="register.subtitle">Register new gym members and send them for admin approval before access is activated.</p>
      </div>
      <div class="hero-actions">
        <div class="language-switcher" data-language-switcher>
          <button class="is-active" type="button" data-lang="en">ENG</button>
          <button type="button" data-lang="my">မြန်မာ</button>
        </div>
        <a class="secondary-button button-inline" href="index.html">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7"></path></svg>
          <span data-i18n="common.back_to_login">Back to Login</span>
        </a>
      </div>
    </section>

    <section class="glass-panel">
      <form id="registrationForm" class="form-stack">
        <div class="form-grid two-column">
          <div class="field">
            <label for="fullName" data-i18n="register.name">Name</label>
            <input id="fullName" type="text" required>
          </div>
          <div class="field">
            <label for="phone" data-i18n="register.phone">Phone</label>
            <input id="phone" type="tel" required>
          </div>
          <div class="field">
            <label for="email" data-i18n="register.email_optional">Email (Optional)</label>
            <input id="email" type="email">
          </div>
          <div class="field">
            <label for="memberPassword" data-i18n="register.password">Password</label>
            <div class="password-field">
              <input id="memberPassword" type="password" minlength="4" autocomplete="new-password" required>
              <button class="password-toggle" type="button" data-toggle-password="memberPassword" aria-label="Show password">
                <svg class="icon eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="icon eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-4.8"></path><path d="M9.9 5.3A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.1 4.1"></path><path d="M6.1 6.7A17.2 17.2 0 0 0 2 12s3.5 7 10 7a10.9 10.9 0 0 0 4.2-.8"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="memberPasswordConfirm" data-i18n="register.confirm_password">Confirm Password</label>
            <div class="password-field">
              <input id="memberPasswordConfirm" type="password" minlength="4" autocomplete="new-password" required>
              <button class="password-toggle" type="button" data-toggle-password="memberPasswordConfirm" aria-label="Show password">
                <svg class="icon eye-open" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="icon eye-closed" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-4.8"></path><path d="M9.9 5.3A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.1 4.1"></path><path d="M6.1 6.7A17.2 17.2 0 0 0 2 12s3.5 7 10 7a10.9 10.9 0 0 0 4.2-.8"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="gender" data-i18n="register.gender">Gender</label>
            <select id="gender" required>
              <option value="" disabled selected hidden data-i18n="register.gender_select">Select</option>
              <option value="Male" data-i18n="register.gender_male">Male</option>
              <option value="Female" data-i18n="register.gender_female">Female</option>
              <option value="Other" data-i18n="register.gender_other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="age" data-i18n="register.age">Age</label>
            <input id="age" type="number" min="10" max="100" required>
          </div>
          <div class="field">
            <label for="weightKg" data-i18n="register.weight">Weight (kg)</label>
            <div class="unit-input">
              <input id="weightKg" type="text" inputmode="decimal" required>
              <select id="weightUnit" aria-label="Weight unit">
                <option value="kg">kg</option>
                <option value="lb">lb</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="heightCm" data-i18n="register.height">Height (cm)</label>
            <div class="unit-input">
              <input id="heightCm" type="text" inputmode="text" placeholder="5'6&quot; or 5.6" required>
              <select id="heightUnit" aria-label="Height unit">
                <option value="cm">cm</option>
                <option value="ft">ft</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="startDate" data-i18n="register.start_date">Start Date</label>
            <input id="startDate" type="date" required>
          </div>
          <div class="field">
            <label for="membershipMonths" data-i18n="register.months">How Many Months</label>
            <input id="membershipMonths" type="number" min="1" max="24" value="1" required>
          </div>
          <div class="field">
            <label for="endDate" data-i18n="register.end_date">End Date</label>
            <input id="endDate" type="date">
          </div>
          <div class="field">
            <label for="incomeAmount" data-i18n="register.membership_fee">Membership Fee</label>
            <input id="incomeAmount" type="number" min="0" step="100" inputmode="decimal" placeholder="50000" required>
          </div>
          <div class="field">
            <label for="personalTrainer" data-i18n="register.personal_trainer">Personal Trainer</label>
            <select id="personalTrainer" required>
              <option value="No" data-i18n="register.trainer_no">No</option>
              <option value="Yes" data-i18n="register.trainer_yes">Yes</option>
            </select>
          </div>
          <div class="field">
            <label for="trainerNotes" data-i18n="register.goal_note">Fitness Goal / Note</label>
            <input id="trainerNotes" type="text" data-i18n-placeholder="register.goal_placeholder" placeholder="Weight loss, muscle gain, rehab, etc.">
          </div>
          <div class="field field-span-2">
            <label data-i18n="register.photo">Member Photo</label>
            <div class="photo-capture-panel">
              <input id="photoUpload" type="file" accept="image/*" hidden>
              <div class="inline-actions">
                <button id="choosePhotoButton" class="secondary-button button-inline" type="button">
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h4l2-2h2l2 2h4v12H5z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                  <span data-i18n="register.choose_photo">Choose Photo</span>
                </button>
                <button id="startCameraButton" class="secondary-button button-inline" type="button">
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 10l4.5-2.5v9L15 14"></path><rect x="3" y="6" width="12" height="12" rx="2"></rect></svg>
                  <span data-i18n="register.open_camera">Open Camera</span>
                </button>
                <button id="capturePhotoButton" class="primary-button button-inline" type="button" hidden>
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle></svg>
                  <span data-i18n="register.take_photo">Take Photo</span>
                </button>
                <button id="retakePhotoButton" class="ghost-button button-inline" type="button" hidden>
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4v6h6"></path><path d="M20 20v-6h-6"></path><path d="M20 8a8 8 0 0 0-13.66-2.34L4 8"></path><path d="M4 16a8 8 0 0 0 13.66 2.34L20 16"></path></svg>
                  <span data-i18n="register.retake_photo">Retake</span>
                </button>
              </div>
              <video id="photoCameraPreview" class="scanner-video" hidden playsinline muted></video>
              <canvas id="photoCanvas" hidden></canvas>
              <div class="photo-preview-shell">
                <img id="photoPreview" class="photo-preview" alt="Member photo preview" hidden>
                <div id="photoPlaceholder" class="photo-placeholder" data-i18n="register.photo_placeholder">No photo selected yet</div>
              </div>
              <p id="photoMessage" class="form-message" aria-live="polite"></p>
            </div>
          </div>
        </div>

        <p class="info-note" data-i18n="register.info_note">Member login after approval: phone number + your password</p>
        <p id="registerMessage" class="form-message" aria-live="polite"></p>

        <button id="registerButton" class="primary-button button-inline" type="submit">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
          <span data-i18n="register.submit">Submit Registration</span>
        </button>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="api.js"></script>
  <script src="common.js"></script>
  <script src="register.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
